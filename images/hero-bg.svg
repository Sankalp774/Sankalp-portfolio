<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow-red" cx="75%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#cf2e2e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cf2e2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="15%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#2874fc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2874fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow-red)"/>
  <rect width="1920" height="1080" fill="url(#glow-blue)"/>
</svg>